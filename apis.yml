aid: picpurify
name: PicPurify
description: PicPurify provides image and video moderation services including gun and knife weapon detection, nudity, drug,
  gore, hate sign, age, gender, and other content moderation tasks. Pictures showing someone posing with a firearm or holding
  a knife can offend visitors, shock young minds and displease advertisers - PicPurify detects these images so they can be
  filtered before publication.
